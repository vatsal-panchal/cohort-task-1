<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikachu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>

        <section class="left">

                <h1>Pikachu</h1>
                <p>Pikachu is an Electric-type Pokémon introduced
                in Generation l. Pikachu are small, chubby,
                and incredibly cute mouse-like Pokémon.
                They are almost completely covered by
                yellow fur.</p>
                <p><span></span> 01 / 08</p>
                <img width="200px" class="pokeball" src="pokeball.png" alt="pokeball">
            </div>
        </section>
        <section class="right">
            <img class="pikachu" src="pikachu.png" alt="pikachu">
            <img class="menu" width="30px" src="menu.svg" alt="menu">
            <div class="dots">
                <span class="active"></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
