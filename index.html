<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Gen I - Pikachu</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Left Section -->
        <div class="left-section">
            <div class="header">
                <div class="pokemon-logo">Pokémon</div>
                <div class="gen-label">POKEMON GEN I</div>
            </div>

            <div>
                <h1 class="title">Pikachu</h1>

                <p class="description">
                    Pikachu is an Electric-type Pokémon introduced in Generation I.
                    Pikachu are small, chubby, and incredibly cute mouse-like Pokémon.
                    They are almost completely covered by yellow fur.
                </p>

                <div class="counter">— 01 / 08</div>
            </div>

            <div class="circle-decoration"></div>
        </div>

        <!-- Right Section -->
        <div class="right-section">
            <div class="pikachu-container">
                <div class="pikachu">
                    <div class="pikachu-body">

                        <img height="300" src="pikachu body.png" alt="">

                    </div>
                </div>
            </div>

            <!-- Indicator Dots -->
            <div class="indicator-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- Top Bar -->
        <div class="top-bar">
            <div class="menu-icon">
                <div class="menu-line"></div>
                <div class="menu-line"></div>
                <div class="menu-line"></div>
            </div>
        </div>
    </div>
</body>
</html>
