<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Gen I - Pikachu</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 600px;
        }

        /* LEFT SECTION - Yellow Background */
        .left-section {
            position: relative;
            background: linear-gradient(135deg, #FCD34D 0%, #F59E0B 100%);
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Header with Logo */
        .header {
            position: relative;
            z-index: 10;
        }

        .pokemon-logo {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(45deg, #1F2937, #4B5563);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .gen-label {
            font-size: 13px;
            letter-spacing: 3px;
            color: #374151;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* Main Title */
        .title {
            position: relative;
            z-index: 10;
            font-size: 80px;
            font-weight: 900;
            color: #1F2937;
            line-height: 1;
            margin: 20px 0;
            letter-spacing: -2px;
        }

        /* Description */
        .description {
            position: relative;
            z-index: 10;
            font-size: 16px;
            color: #4B5563;
            line-height: 1.8;
            max-width: 85%;
            margin-bottom: 40px;
            font-weight: 500;
        }

        /* Counter */
        .counter {
            position: relative;
            z-index: 10;
            font-size: 14px;
            color: #6B7280;
            font-weight: 700;
            letter-spacing: 2px;
            padding-top: 20px;
            border-top: 2px solid #D1D5DB;
            display: inline-block;
        }

        /* Decorative Circle - Bottom Left */
        .circle-decoration {
            position: absolute;
            bottom: 0;
            left: -50px;
            width: 300px;
            height: 300px;
            border: 8px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            z-index: 1;
        }

        /* RIGHT SECTION - Light Background */
        .right-section {
            position: relative;
            background: linear-gradient(135deg, #FEF3C7 0%, #FFF7ED 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow: hidden;
        }

        /* Pikachu Image - Using SVG */
        .pikachu-container {
            position: relative;
            width: 300px;
            height: 300px;
            animation: float 4s ease-in-out infinite;
        }
    
        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* Pikachu Body Parts Using CSS */
        .pikachu-body {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        /* Head */
        .head {
            position: absolute;
            width: 120px;
            height: 120px;
            background: #FFD93D;
            border: 3px solid #1A1A1A;
            border-radius: 50%;
            top: 20px;
            left: 80px;
            z-index: 5;
        }

        /* Left Ear */
        .ear-left {
            position: absolute;
            width: 35px;
            height: 80px;
            background: #FFD93D;
            border: 3px solid #1A1A1A;
            border-radius: 50% 50% 40% 40%;
            top: 10px;
            left: 90px;
            transform: rotate(-25deg);
            z-index: 4;
        }

        .ear-left-tip {
            position: absolute;
            width: 18px;
            height: 35px;
            background: #1A1A1A;
            border-radius: 50%;
            top: 5px;
            left: 9px;
        }

        /* Right Ear */
        .ear-right {
            position: absolute;
            width: 35px;
            height: 80px;
            background: #FFD93D;
            border: 3px solid #1A1A1A;
            border-radius: 50% 50% 40% 40%;
            top: 10px;
            right: 90px;
            transform: rotate(25deg);
            z-index: 4;
        }

        .ear-right-tip {
            position: absolute;
            width: 18px;
            height: 35px;
            background: #1A1A1A;
            border-radius: 50%;
            top: 5px;
            right: 9px;
        }

        /* Eyes */
        .eye-left {
            position: absolute;
            width: 12px;
            height: 16px;
            background: #1A1A1A;
            border-radius: 50%;
            top: 50px;
            left: 100px;
            z-index: 6;
        }

        .eye-right {
            position: absolute;
            width: 12px;
            height: 16px;
            background: #1A1A1A;
            border-radius: 50%;
            top: 50px;
            right: 100px;
            z-index: 6;
        }

        /* Cheeks */
        .cheek-left {
            position: absolute;
            width: 28px;
            height: 28px;
            background: #FF6B6B;
            border-radius: 50%;
            top: 70px;
            left: 70px;
            z-index: 3;
            opacity: 0.9;
        }

        .cheek-right {
            position: absolute;
            width: 28px;
            height: 28px;
            background: #FF6B6B;
            border-radius: 50%;
            top: 70px;
            right: 70px;
            z-index: 3;
            opacity: 0.9;
        }

        /* Mouth */
        .mouth {
            position: absolute;
            width: 20px;
            height: 20px;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 6;
        }

        .mouth-upper {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #1A1A1A;
            border-radius: 50% 50% 0 0;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        .mouth-lower {
            position: absolute;
            width: 12px;
            height: 15px;
            background: #FF1744;
            border-radius: 0 0 50% 50%;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* Body */
        .body {
            position: absolute;
            width: 100px;
            height: 110px;
            background: #FFD93D;
            border: 3px solid #1A1A1A;
            border-radius: 40% 40% 30% 30%;
            top: 140px;
            left: 90px;
            z-index: 2;
        }

        /* Belly */
        .belly {
            position: absolute;
            width: 50px;
            height: 60px;
            background: #FFED4E;
            border: 2px solid #FFA500;
            border-radius: 50%;
            top: 155px;
            left: 115px;
            z-index: 3;
            opacity: 0.7;
        }

        /* Left Arm */
        .arm-left {
            position: absolute;
            width: 35px;
            height: 60px;
            background: #FFD93D;
            border: 3px solid #1A1A1A;
            border-radius: 50% 50% 45% 45%;
            top: 155px;
            left: 75px;
            transform: rotate(-30deg);
            z-index: 1;
        }

        .arm-left-paw {
            position: absolute;
            width: 18px;
            height: 20px;
            background: #1A1A1A;
            border-radius: 50%;
            bottom: -8px;
            left: 9px;
        }

        /* Right Arm */
        .arm-right {
            position: absolute;
            width: 35px;
            height: 60px;
            background: #FFD93D;
            border: 3px solid #1A1A1A;
            border-radius: 50% 50% 45% 45%;
            top: 155px;
            right: 75px;
            transform: rotate(30deg);
            z-index: 1;
        }

        .arm-right-paw {
            position: absolute;
            width: 18px;
            height: 20px;
            background: #1A1A1A;
            border-radius: 50%;
            bottom: -8px;
            right: 9px;
        }

        /* Tail */
        .tail {
            position: absolute;
            width: 45px;
            height: 70px;
            background: #FFD93D;
            border: 3px solid #1A1A1A;
            border-radius: 50% 50% 50% 30%;
            bottom: 30px;
            right: 45px;
            transform: rotate(-35deg);
            z-index: 0;
        }

        .tail-tip {
            position: absolute;
            width: 25px;
            height: 30px;
            background: #8B4513;
            border: 3px solid #1A1A1A;
            border-radius: 50%;
            bottom: -5px;
            right: 5px;
        }

        /* Left Leg */
        .leg-left {
            position: absolute;
            width: 28px;
            height: 50px;
            background: #FFD93D;
            border: 3px solid #1A1A1A;
            border-radius: 50% 50% 30% 30%;
            bottom: 20px;
            left: 100px;
            z-index: 1;
        }

        .leg-left-paw {
            position: absolute;
            width: 28px;
            height: 15px;
            background: #1A1A1A;
            border-radius: 50% 50% 0 0;
            bottom: -10px;
            left: 0;
        }

        /* Right Leg */
        .leg-right {
            position: absolute;
            width: 28px;
            height: 50px;
            background: #FFD93D;
            border: 3px solid #1A1A1A;
            border-radius: 50% 50% 30% 30%;
            bottom: 20px;
            right: 100px;
            z-index: 1;
        }

        .leg-right-paw {
            position: absolute;
            width: 28px;
            height: 15px;
            background: #1A1A1A;
            border-radius: 50% 50% 0 0;
            bottom: -10px;
            right: 0;
        }

        /* Dot Indicator */
        .indicator-dots {
            position: absolute;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #FCD34D;
            border: 2px solid #F59E0B;
            transition: transform 0.3s ease;
        }

        .dot:first-child {
            transform: scale(1.3);
            background: #F59E0B;
        }

        .dot:hover {
            transform: scale(1.2);
        }

        /* Header Bar */
        .top-bar {
            position: absolute;
            top: 0;
            right: 0;
            background: white;
            padding: 15px 20px;
            border-radius: 0 30px 0 30px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 20;
            box-shadow: -5px 5px 15px rgba(0, 0, 0, 0.05);
        }

        .menu-icon {
            width: 30px;
            height: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }

        .menu-line {
            width: 100%;
            height: 3px;
            background: #1A1A1A;
            border-radius: 2px;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                min-height: auto;
            }

            .left-section {
                padding: 40px 30px;
                min-height: 400px;
            }

            .right-section {
                min-height: 350px;
            }

            .title {
                font-size: 50px;
            }

            .pikachu {
                width: 200px;
                height: 200px;
            }

            .indicator-dots {
                right: 20px;
            }

            .top-bar {
                border-radius: 0;
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left Section -->
        <div class="left-section">
            <div class="header">
                <div class="pokemon-logo">Pokémon</div>
                <div class="gen-label">POKEMON GEN I</div>
            </div>

            <div>
                <h1 class="title">Pikachu</h1>
                <p class="description">Pikachu is an Electric-type Pokémon introduced in Generation I. Pikachu are small, chubby, and incredibly cute mouse-like Pokémon. They are almost completely covered by yellow fur.</p>
                <div class="counter">— 01 / 08</div>
            </div>

            <div class="circle-decoration"></div>
        </div>

        <!-- Right Section -->
        <div class="right-section">
            <div class="pikachu-container">
                <div class="pikachu">
                    <div class="pikachu-body">
                        <!-- Tail -->
                        <img height="300" src="pikachu body.png" alt="">

                        <!-- Body -->
                        

                        <!-- Eyes -->
                        
                       
                        <!-- Mouth -->
                       
                        </div>
                    </div>
                </div>
            </div>

            <!-- Indicator Dots -->
            <div class="indicator-dots">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- Top Bar -->
        <div class="top-bar">
            <div class="menu-icon">
                <div class="menu-line"></div>
                <div class="menu-line"></div>
                <div class="menu-line"></div>
            </div>
        </div>
    </div>
</body>
</html>
